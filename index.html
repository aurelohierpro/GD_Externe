<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Development — Carte monde</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://unpkg.com/deck.gl@9.0.35/dist.min.js"></script>
</head>
<body>
  <div id="container">
    <div id="ui-top-left" class="panel">
      <div class="header-block">
        <div class="title-main">GLOBAL DEVELOPMENT</div>
        <div class="title-sub">Présence géographique des projets du groupe</div>
      </div>

      <div id="ui-stats">
        <div class="stat">
          <div class="stat-value" id="stat-countries">–</div>
          <div class="stat-label">Pays couverts</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-projects">–</div>
          <div class="stat-label">Projets</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-amount">–</div>
          <div class="stat-label">Montant cumulé</div>
        </div>
      </div>
    </div>

    <div id="ui-top-right" class="panel">
      <div class="controls-title">Indicateur affiché</div>
      <div class="segmented mode-group">
        <button id="btnProjects" class="seg-btn active">Nombre de projets</button>
        <button id="btnAmount" class="seg-btn">Montant cumulé</button>
      </div>

      <div class="controls-title section-title">Périmètre affiché</div>
      <div class="segmented scope-group">
        <button id="btnScopeAll" class="seg-btn active">Groupe</button>
        <button id="btnScopeHydro" class="seg-btn">Hydroconseil</button>
        <button id="btnScopeNexsom" class="seg-btn">Nexsom</button>
        <button id="btnScopeUrba" class="seg-btn">Urbaconsulting</button>
      </div>
    </div>

    <div id="ui-legend" class="panel">
      <div class="legend-title" id="legendTitle">Nombre de projets</div>
      <div id="legendItems"></div>
    </div>

    <div id="tooltip"></div>
  </div>

  <script src="./script.js?v=1"></script>
</body>
</html>
